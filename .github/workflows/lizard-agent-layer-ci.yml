name: lizard-agent-layer CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-smoke-matrix:
    name: Validate, smoke, and matrix
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI gates
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\ci.ps1
